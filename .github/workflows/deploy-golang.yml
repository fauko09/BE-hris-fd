name: Deploy Golang HRIS App

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... || true

      - name: Build binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/hris-api .

      - name: Create .env file
        run: |
          cat > build/.env << EOF
          DB_HOST=localhost
          DB_PORT=3306
          DB_USER=hris_user
          DB_PASSWORD=@FawqHrisSV26
          DB_NAME=hris
          APP_PORT=8986
          EOF

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 151.240.0.108 >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            set -e
            mkdir -p /var/www/hris/api
            rm -rf /var/www/hris/api/app
            rm -f /var/www/hris/api/hris-api
          EOF

          scp -i ~/.ssh/deploy_key -P 22 build/hris-api root@151.240.0.108:/tmp/hris-api
          scp -i ~/.ssh/deploy_key -P 22 build/.env root@151.240.0.108:/tmp/hris.env

          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            set -e
            mv /tmp/hris-api /var/www/hris/api/hris-api
            mv /tmp/hris.env /var/www/hris/api/.env
            chmod +x /var/www/hris/api/hris-api
          EOF

      - name: Configure Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            set -e

            cat > /etc/nginx/sites-available/hris-api << 'NGINX'
            server {
                listen 80;
                server_name 151.240.0.108 _;

                client_max_body_size 50M;

                location /api/ {
                    proxy_pass http://127.0.0.1:8986/;
                    proxy_http_version 1.1;

                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";

                    proxy_read_timeout 300;
                    proxy_connect_timeout 300;
                    proxy_send_timeout 300;
                }

                location = /api {
                    return 301 /api/;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/hris-api /etc/nginx/sites-enabled/hris-api
            rm -f /etc/nginx/sites-enabled/default

            nginx -t
            systemctl reload nginx
          EOF

      - name: Restart app on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            set -e

            cd /var/www/hris/api

            set -a
            source .env
            set +a

            pm2 delete hris-api || true
            pm2 start ./hris-api --name hris-api --update-env
            pm2 save

            sleep 2
            pm2 list
            pm2 logs hris-api --lines 50 --nostream

            nginx -t
            systemctl restart nginx
          EOF