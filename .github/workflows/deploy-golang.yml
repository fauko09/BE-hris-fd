name: Deploy Golang HRIS App

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... || true

      - name: Build binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/app .

      - name: Create .env file
        run: |
          cat > build/.env << EOF
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=hris_user
          DB_PASSWORD=@FawqHrisSV26
          DB_NAME=hris
          APP_PORT=8986
          EOF

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 151.240.0.108 >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 "mkdir -p /var/www/hris/api"

          scp -i ~/.ssh/deploy_key -P 22 build/app root@151.240.0.108:/var/www/hris/api/app
          scp -i ~/.ssh/deploy_key -P 22 build/.env root@151.240.0.108:/var/www/hris/api/.env

      - name: Configure Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            set -e

            sudo tee /etc/nginx/sites-available/hris-api > /dev/null << 'NGINX'
            server {
                listen 80;
                server_name 151.240.0.108 _;

                client_max_body_size 50M;

                location / {
                    proxy_pass http://127.0.0.1:8986;
                    proxy_http_version 1.1;

                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";

                    proxy_read_timeout 300;
                    proxy_connect_timeout 300;
                    proxy_send_timeout 300;
                }
            }
            NGINX

            sudo ln -sf /etc/nginx/sites-available/hris-api /etc/nginx/sites-enabled/hris-api

            if [ -f /etc/nginx/sites-enabled/default ]; then
              sudo rm -f /etc/nginx/sites-enabled/default
            fi

            sudo nginx -t
            sudo systemctl reload nginx
          EOF

      - name: Restart app on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            set -e

            cd /var/www/hris/api
            chmod +x app

            pm2 delete hris-api || true
            pm2 start ./app --name hris-api --update-env
            pm2 save

            sleep 2
            pm2 list
            pm2 logs hris-api --lines 50 --nostream

            sudo systemctl reload nginx
          EOF