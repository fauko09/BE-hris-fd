name: Deploy Golang HRIS App

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... || true

      - name: Build binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/app .

      - name: Create .env file
        run: |
          cat > build/.env << EOF
          DB_HOST=localhost
          DB_PORT=3306
          DB_USER=hris_user
          DB_PASSWORD=@FawqHrisSV26
          DB_NAME=hris
          APP_PORT=8986
          EOF

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 151.240.0.108 >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 "mkdir -p /var/www/hris/api"

          scp -i ~/.ssh/deploy_key -P 22 build/app root@151.240.0.108:/var/www/hris/api/app
          scp -i ~/.ssh/deploy_key -P 22 build/.env root@151.240.0.108:/var/www/hris/api/.env

      - name: Restart app on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 root@151.240.0.108 << 'EOF'
            cd /var/www/hris/api
            chmod +x app
            pm2 delete hris-api || true
            pm2 start ./app --name hris-api
            pm2 save
            sudo systemctl reload nginx
          EOF