      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete divisi
      tags:
      - Divisi
    put:
      consumes:
      - application/json
      description: Update nama divisi berdasarkan ID
      parameters:
      - description: Divisi ID
        in: path
        name: id
        required: true
        type: string
      - description: Divisi Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.DivisiRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
