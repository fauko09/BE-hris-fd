      description: Login dan mendapatkan JWT token
      parameters:
      - description: Login Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Membuat akun user baru
      parameters:
      - description: Register Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register user baru
      tags:
      - Auth
  /cuti:
    get:
      description: Ambil semua pengajuan cuti (admin)
      parameters:
      - description: Filter status (pending/approved/rejected)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get semua cuti
      tags:
      - Cuti
    post:
      consumes:
      - application/json
      description: Karyawan mengajukan permohonan cuti
      parameters:
      - description: Cuti Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CutiRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ajukan cuti
      tags:
      - Cuti
  /cuti/{id}/approve:
    put:
      consumes:
      - application/json
      description: HR menyetujui atau menolak pengajuan cuti
      parameters:
      - description: Cuti ID
        in: path
        name: id
        required: true
        type: string
      - description: Approve Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ApproveCutiRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Approve/Reject cuti
      tags:
      - Cuti
  /cuti/me:
    get:
      description: Ambil riwayat cuti user yang sedang login
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get cuti saya
      tags:
      - Cuti
  /divisi:
    get:
      description: Ambil daftar semua divisi
      produces:
