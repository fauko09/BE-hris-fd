basePath: /api/v1
definitions:
  model.ApproveCutiRequest:
    properties:
      catatan_hr:
        type: string
      status:
        type: string
    required:
    - status
    type: object
  model.CutiRequest:
    properties:
      alasan:
        type: string
      tanggal_akhir:
        type: string
      tanggal_mulai:
        type: string
      tipe_cuti:
        type: string
    required:
    - alasan
    - tanggal_akhir
    - tanggal_mulai
    - tipe_cuti
    type: object
  model.DataUserRequest:
    properties:
      alamat_ktp:
        type: string
      alamat_tinggal:
        type: string
      divisi_id:
        type: string
      domisili_ktp:
        type: string
      domisili_lahir:
        type: string
      domisili_tinggal:
        type: string
      is_bpjs_tk:
        type: boolean
      jabatan_id:
        type: string
      jenis_asuransi:
        type: string
      nama_asuransi:
        type: string
      no_asuransi:
        type: string
      no_bpjs:
        type: string
      no_npwp:
        type: string
      no_rekening:
        type: string
      nomor_telepon:
        type: string
      nomor_telepon_darurat:
        type: string
      nomor_telepon_second:
        type: string
      prov_ktp:
        type: string
      prov_tinggal:
        type: string
      status:
        type: string
      status_perkawinan:
        type: string
      tanggal_lahir:
        type: string
      tanggal_masuk:
        type: string
      tipe_bank:
        type: string
      tipe_tinggal:
        type: string
    type: object
  model.DivisiRequest:
    properties:
      name_divisi:
        type: string
    required:
    - name_divisi
    type: object
  model.JabatanRequest:
    properties:
      nama_jabatan:
        type: string
    required:
    - nama_jabatan
    type: object
  model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  model.PenggajianRequest:
    properties:
      gaji_pokok:
        type: number
      keterangan:
        type: string
      periode:
        type: string
      potongan:
        type: number
      tunjangan:
        type: number
      uid:
        type: string
    required:
    - gaji_pokok
    - periode
    - uid
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      fullname:
        type: string
      nik:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - fullname
    - nik
    - password
    type: object
host: localhost:8080
info:
  contact: {}
  description: API untuk sistem HRIS (Human Resource Information System)
  title: HRIS API
  version: "1.0"
paths:
  /absensi/clock-in:
    post:
      consumes:
      - application/json
      description: Karyawan melakukan clock in
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Clock In
      tags:
      - Absensi
  /absensi/clock-out:
    post:
      consumes:
      - application/json
      description: Karyawan melakukan clock out
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Clock Out
      tags:
      - Absensi
  /absensi/me:
    get:
      description: Ambil riwayat absensi user yang sedang login
      parameters:
      - description: Bulan (1-12)
        in: query
        name: bulan
        type: integer
      - description: 'Tahun (contoh: 2026)'
        in: query
        name: tahun
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get absensi saya
      tags:
      - Absensi
  /absensi/today:
    get:
      description: Ambil semua absensi hari ini (admin)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
